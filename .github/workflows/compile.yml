name: Compilar Cheat Forsaken

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Clonar o codigo
      uses: actions/checkout@v4

    - name: Configurar o .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restaurar as dependencias
      run: dotnet restore

    - name: Compilar o Projeto (Release)
      run: dotnet build -c Release

    - name: Disponibilizar o arquivo .EXE para baixar
      uses: actions/upload-artifact@v4
      with:
        name: Forsaken-External-CS
        path: '**/bin/Release/net8.0/*.exe'